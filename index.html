  <!--ternary operator-->

  <h1>finding largest of the three numbers </h1>
    <script>
        var a = 10;
        var b = 20;
        var c = 15;
        document.write("The numbers are: " + a + ", " + b + ", " + c + "<br>");

        document.write("The largest number is: " + (a > b ? (a > c ? a : c) : (b > c ? b : c)));
    </script>

       <!--switch-->
    <script type="text/javascript">
        var grade = 'A';
        switch (grade) {
            case 'A':
                document.write("Excellent</br>");
                break;
            case 'B':
                document.write("Good");
                break;
            case 'C':
                document.write("Fair");
                break;
            case 'D':
                document.write("Poor");
                break;
            case 'F':
                document.write("Fail");
                break;
            default:
                document.write("Invalid grade</br>");
        }
        document.write("exiting switch block </br></br>" );
    </script>
